# render.yaml — Q8: Deployment Configuration
services:
  # Backend Web Service
  - type: web
    name: employee-analytics-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false  # Your Render frontend URL

  # Frontend Static Site
  - type: web
    name: employee-analytics-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Your Render backend URL + /api
